spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/forseti}
    username: ${DB_USER:forseti}
    password: ${DB_PASSWORD:forsetijudge}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:forsetijudge}
  amqp:
    deserialization:
      trust:
        all: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:forseti}
    password: ${RABBITMQ_PASSWORD:forsetijudge}
    virtual-host: ${RABBITMQ_VHOST:/}
    exchange:
      direct: ${RABBITMQ_DIRECT_EXCHANGE:direct-exchange}
      fanout: ${RABBITMQ_FANOUT_EXCHANGE:fanout-exchange}
    queue:
      attachment-bucket-cleaner: ${RABBITMQ_ATTACHMENT_BUCKET_CLEANER_QUEUE:attachment-bucket-cleaner-queue}
      auto-freeze: ${RABBITMQ_AUTO_FREEZE_QUEUE:auto-freeze-queue}
      outbox-event: ${RABBITMQ_OUTBOX_EVENT_QUEUE:outbox-event-queue}
      submission: ${RABBITMQ_SUBMISSION_QUEUE:submission-queue}
      submission-failed: ${RABBITMQ_SUBMISSION_FAILED_QUEUE:submission-failed-queue}
    routing-key:
      attachment-bucket-cleaner: ${RABBITMQ_ATTACHMENT_BUCKET_CLEANER_ROUTING_KEY:attachment-bucket-cleaner-routing-key}
      auto-freeze: ${RABBITMQ_AUTO_FREEZE_ROUTING_KEY:auto-freeze-routing-key}
      broadcast-event: ${RABBITMQ_BROADCAST_EVENT_ROUTING_KEY:broadcast-event-routing-key}
      submission: ${RABBITMQ_SUBMISSION_ROUTING_KEY:submission-routing-key}
    listener:
      simple:
        retry:
          enabled: false
        default-requeue-rejected: false
  quartz:
    max-retries: 0
clamav:
  host: ${CLAMAV_HOST:localhost}
  port: ${CLAMAV_PORT:3310}
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:forseti}
  secret-key: ${MINIO_SECRET_KEY:forsetijudge}
  bucket: ${MINIO_BUCKET:forseti}
security:
  session:
    expiration:
      default: ${SESSION_EXPIRATION:12h}
      root: ${SESSION_ROOT_EXPIRATION:12h}
      system: ${SESSION_SYSTEM_EXPIRATION:12h}
  root:
    password: ${ROOT_PASSWORD:forsetijudge}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    cache-size: ${RATE_LIMIT_CACHE_SIZE:100000}
    cache-ttl-hours: ${RATE_LIMIT_CACHE_TTL_HOURS:1}
    default:
      requests-per-minute: ${RATE_LIMIT_DEFAULT_RPM:60}
      requests-per-hour: ${RATE_LIMIT_DEFAULT_RPH:1000}
      burst-capacity: ${RATE_LIMIT_DEFAULT_BURST:10}
    authentication:
      requests-per-minute: ${RATE_LIMIT_AUTH_RPM:5}
      requests-per-hour: ${RATE_LIMIT_AUTH_RPH:20}
      burst-capacity: ${RATE_LIMIT_AUTH_BURST:2}
