[tool.pytest.ini_options]
testpaths = ["test"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

[tool.coverage.run]
source = ["cli"]
omit = ["cli/config.py", "cli/__main__.py", "cli/_config.py"]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = false
skip_empty = false

[tool.isort]
profile = "black"