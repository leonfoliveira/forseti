apiVersion: 1

datasources:
  # Low privilege datasources (Org ID 1)

  - name: Loki
    type: loki
    uid: loki_org1
    orgId: 1
    access: proxy
    url: ${LOKI_URL}
    editable: false
    version: 1

  - name: Prometheus
    type: prometheus
    uid: prometheus_org1
    orgId: 1
    access: proxy
    url: ${PROMETHEUS_URL}
    editable: false
    jsonData:
      httpMethod: GET
    version: 1

  - name: Tempo
    type: tempo
    uid: tempo_org1
    orgId: 1
    access: proxy
    url: ${TEMPO_URL}
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: "prometheus_org1"
    editable: false
    version: 1

  # High privilege datasources (Org ID 2)

  - name: Loki
    type: loki
    uid: loki_org2
    orgId: 2
    access: proxy
    url: ${LOKI_URL}
    editable: false
    version: 1

  - name: Prometheus
    type: prometheus
    uid: prometheus_org2
    orgId: 2
    access: proxy
    url: ${PROMETHEUS_URL}
    editable: false
    jsonData:
      httpMethod: GET
    version: 1

  - name: Tempo
    type: tempo
    uid: tempo_org2
    orgId: 2
    access: proxy
    url: ${TEMPO_URL}
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: "prometheus_org2"
    editable: false
    version: 1

  - name: Postgres
    type: postgres
    uid: postgres_org2
    orgId: 2
    access: proxy
    url: ${DB_URL}
    database: ${DB_NAME}
    user: ${DB_USER}
    jsonData:
      sslmode: disable
    secureJsonData:
      password: ${DB_PASSWORD}
    editable: false
    version: 1
