name: forseti-dev
services:
  postgres:
    container_name: dev-forseti-postgres
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_USER: forseti
      POSTGRES_PASSWORD: forsetijudge
      POSTGRES_DB: forseti
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forseti -d forseti"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: postgres:17.5-alpine
    networks:
      - dev-forseti-network
    ports:
      - 5432:5432
    profiles:
      - infra
    volumes:
      - dev-postgres_data:/var/lib/postgresql/data

  redis:
    command: redis-server --requirepass "forsetijudge"
    container_name: dev-forseti-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a forsetijudge ping || exit 1"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: redis:8.6.1-alpine
    networks:
      - dev-forseti-network
    ports:
      - 6379:6379
    profiles:
      - infra

  minio:
    command: server /data --console-address ":9001"
    container_name: dev-forseti-minio
    environment:
      MINIO_ROOT_USER: forseti
      MINIO_ROOT_PASSWORD: forsetijudge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/minio/health/live || exit 1",
        ]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    networks:
      - dev-forseti-network
    ports:
      - 9000:9000
      - 9001:9001
    profiles:
      - infra
    volumes:
      - dev-minio_data:/data

  rabbitmq:
    container_name: dev-forseti-rabbitmq
    entrypoint: /entrypoint.sh
    environment:
      RABBITMQ_USER: forseti
      RABBITMQ_PASSWORD: forsetijudge
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: rabbitmq:4.1.4-management-alpine
    networks:
      - dev-forseti-network
    ports:
      - 5672:5672
      - 15672:15672
    profiles:
      - infra
    volumes:
      - dev-rabbitmq_data:/var/lib/rabbitmq
      - ./volumes/rabbitmq/entrypoint.sh:/entrypoint.sh:ro
      - ./volumes/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./volumes/rabbitmq/definitions.template.json:/etc/rabbitmq/definitions.template.json:ro

  debezium:
    container_name: dev-forseti-debezuim
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: forseti
      DB_PASSWORD: forsetijudge
      DB_NAME: forseti
      QUARKUS_HEALTH_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: forseti
      RABBITMQ_PASSWORD: forsetijudge
      RABBITMQ_OUTBOX_EVENT_EXCHANGE: direct-exchange
      RABBITMQ_OUTBOX_EVENT_ROUTING_KEY: outbox-event-routing-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/live"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: debezium/server:2.7.3.Final
    networks:
      - dev-forseti-network
    profiles:
      - infra
    volumes:
      - ./volumes/debezium/application.properties:/debezium/config/application.properties:ro
      - dev-debezium_data:/debezium/data

  migration:
    container_name: dev-forseti-migration
    entrypoint: sh -c "flyway -url=$${FLYWAY_URL} -user=$${FLYWAY_USER} -password=$${FLYWAY_PASSWORD} -connectRetries=60 migrate"
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/forseti
      FLYWAY_USER: forseti
      FLYWAY_PASSWORD: forsetijudge
    depends_on:
      postgres:
        condition: service_healthy
    image: flyway/flyway:11.9.2-alpine
    networks:
      - dev-forseti-network
    profiles:
      - backend
    volumes:
      - ../../applications/backend/core/src/main/resources/migration:/flyway/sql

  api:
    build:
      context: ../../applications/backend
      dockerfile: api.Dockerfile
    container_name: dev-forseti-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    environment:
      API_PORT: 8080
      CLAMAV_ENABLED: "false"
      COOKIE_SECURE: "false"
      DB_PASSWORD: forsetijudge
      DB_URL: jdbc:postgresql://postgres:5432/forseti
      DB_USER: forseti
      GRAFANA_PUBLIC_URL: http://localhost:4000
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=80.0 -XX:InitialRAMPercentage=50.0 -XX:MinRAMPercentage=30.0"
      SESSION_EXPIRATION: 6h
      SESSION_ROOT_EXPIRATION: 3h
      SESSION_AUTOJUDGE_EXPIRATION: 10m
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: forseti
      MINIO_SECRET_KEY: forsetijudge
      MINIO_BUCKET: forseti
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: forseti
      RABBITMQ_PASSWORD: forsetijudge
      RABBITMQ_VHOST: /
      RABBITMQ_DIRECT_EXCHANGE: direct-exchange
      RABBITMQ_FANOUT_EXCHANGE: fanout-exchange
      RABBITMQ_ATTACHMENT_BUCKET_CLEANER_QUEUE: attachment-bucket-cleaner-queue
      RABBITMQ_AUTO_FREEZE_QUEUE: auto-freeze-queue
      RABBITMQ_OUTBOX_EVENT_QUEUE: outbox-event-queue
      RABBITMQ_SUBMISSION_QUEUE: submission-queue
      RABBITMQ_SUBMISSION_FAILED_QUEUE: submission-failed-queue
      RABBITMQ_ATTACHMENT_BUCKET_CLEANER_ROUTING_KEY: attachment-bucket-cleaner-routing-key
      RABBITMQ_AUTO_FREEZE_ROUTING_KEY: auto-freeze-routing-key
      RABBITMQ_BROADCAST_EVENT_ROUTING_KEY: broadcast-event-routing-key
      RABBITMQ_SUBMISSION_ROUTING_KEY: submission-routing-key
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: forsetijudge
      ROOT_PASSWORD: forsetijudge
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      OTEL_SERVICE_NAME: api
      SPRING_PROFILES_ACTIVE: development
      VERSION: latest
      WEBAPP_PUBLIC_URL: http://localhost:3000
      WS_PORT: 8081
    healthcheck:
      test:
        ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: forseti-api:latest
    networks:
      - dev-forseti-network
    ports:
      - 8080:8080
      - 8081:8081
    profiles:
      - backend

  autojudge:
    build:
      context: ../../applications/backend
      dockerfile: autojudge.Dockerfile
    container_name: dev-forseti-autojudge
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    environment:
      API_URL: http://api:8080
      CLAMAV_ENABLED: "false"
      DB_PASSWORD: forsetijudge
      DB_URL: jdbc:postgresql://postgres:5432/forseti
      DB_USER: forseti
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=80.0 -XX:InitialRAMPercentage=50.0 -XX:MinRAMPercentage=30.0"
      SESSION_EXPIRATION: 6h
      SESSION_ROOT_EXPIRATION: 3h
      SESSION_AUTOJUDGE_EXPIRATION: 10m
      MAX_CONCURRENT_SUBMISSIONS: "1"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: forseti
      MINIO_SECRET_KEY: forsetijudge
      MINIO_BUCKET: forseti
      PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: forseti
      RABBITMQ_PASSWORD: forsetijudge
      RABBITMQ_VHOST: /
      RABBITMQ_DIRECT_EXCHANGE: direct-exchange
      RABBITMQ_FANOUT_EXCHANGE: fanout-exchange
      RABBITMQ_ATTACHMENT_BUCKET_CLEANER_QUEUE: attachment-bucket-cleaner-queue
      RABBITMQ_AUTO_FREEZE_QUEUE: auto-freeze-queue
      RABBITMQ_OUTBOX_EVENT_QUEUE: outbox-event-queue
      RABBITMQ_SUBMISSION_QUEUE: submission-queue
      RABBITMQ_SUBMISSION_FAILED_QUEUE: submission-failed-queue
      RABBITMQ_ATTACHMENT_BUCKET_CLEANER_ROUTING_KEY: attachment-bucket-cleaner-routing-key
      RABBITMQ_AUTO_FREEZE_ROUTING_KEY: auto-freeze-routing-key
      RABBITMQ_BROADCAST_EVENT_ROUTING_KEY: broadcast-event-routing-key
      RABBITMQ_SUBMISSION_ROUTING_KEY: submission-routing-key
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: forsetijudge
      ROOT_PASSWORD: forsetijudge
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      OTEL_SERVICE_NAME: autojudge
      SPRING_PROFILES_ACTIVE: development
      VERSION: latest
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: forseti-autojudge:latest
    networks:
      - dev-forseti-network
    ports:
      - 8082:8082
    profiles:
      - backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp

  webapp:
    container_name: dev-forseti-webapp
    build:
      context: ../../applications/webapp
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:8080
      API_PUBLIC_URL: http://localhost:8080
      APP_ENV: development
      LOCALE: en-US
      VERSION: latest
      WS_PUBLIC_URL: ws://localhost:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 5s
    image: forseti-webapp:latest
    networks:
      - dev-forseti-network
    ports:
      - 3000:3000
    profiles:
      - webapp

networks:
  dev-forseti-network:
    driver: bridge

volumes:
  dev-postgres_data:
  dev-redis_data:
  dev-minio_data:
  dev-rabbitmq_data:
  dev-debezium_data:
